name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make clean && make
      - name: Reproducible build
        run: make reproducible
      - name: Unit tests
        run: make test-unit
      - name: Integration replay test
        run: make test-integration
